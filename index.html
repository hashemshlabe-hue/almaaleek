<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة النخبة V8.0 - الأسطورية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --primary: #1a2a6c; --gold: #d4af37; --accent: #7b2ff7;
            --bg: #f8fafc; --glass: rgba(255, 255, 255, 0.9);
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; transition: 0.5s; overflow-x: hidden; }
        
        /* نمط الزخرفة الأندلسية */
        .andalusian-pattern { background-image: url('https://www.transparenttextures.com/patterns/arabesque.png'); }

        /* شريط الأذكار والصلاة */
        .top-bar { background: var(--primary); color: white; padding: 10px; font-size: 11px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--gold); }
        
        .main-header { background: linear-gradient(135deg, var(--primary), var(--accent)); padding: 50px 20px 100px; color: white; text-align: center; border-radius: 0 0 60px 60px; position: relative; }

        /* بروفايل وأوسمة */
        .profile-card { background: var(--glass); backdrop-filter: blur(15px); margin: -70px 20px 20px; padding: 20px; border-radius: 35px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid rgba(212,175,55,0.3); }
        .avatar { width: 70px; height: 70px; border-radius: 20px; border: 3px solid var(--gold); }
        
        /* شريط التقدم */
        .progress-box { margin: 15px 0; }
        .bar-bg { width: 100%; height: 10px; background: #eee; border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(to left, var(--gold), var(--accent)); width: 10%; transition: 1s; }

        /* السبحة الحركية المذهلة */
        .tasbih-v8 { background: white; margin: 0 20px 20px; padding: 20px; border-radius: 30px; display: flex; justify-content: space-between; align-items: center; position: relative; overflow: hidden; }
        .bead { position: absolute; width: 12px; height: 12px; background: var(--gold); border-radius: 50%; opacity: 0; }
        @keyframes beadFly { from { transform: translateY(0) scale(1); opacity: 1; } to { transform: translateY(-100px) scale(0); opacity: 0; } }

        /* الصفحات */
        .page { display: none; padding: 0 20px 130px; animation: slideIn 0.5s ease-out; }
        .page.active { display: block; }
        @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* أزرار ومواد */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; padding: 25px 15px; border-radius: 25px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; position: relative; transition: 0.3s; }
        .card i { font-size: 30px; background: linear-gradient(45deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; display: block; }

        /* الاختبارات */
        .quiz-box { background: #fff; padding: 20px; border-radius: 25px; border: 2px dashed var(--accent); text-align: center; }
        .btn-ans { background: #f1f5f9; border: none; padding: 12px; width: 100%; margin: 5px 0; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-ans:active { background: var(--accent); color: white; }

        /* شريط التنقل السفلي */
        .nav { position: fixed; bottom: 20px; left: 15px; right: 15px; background: var(--dark-bg, #0f172a); padding: 15px; border-radius: 30px; display: flex; justify-content: space-around; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .nav-item { color: rgba(255,255,255,0.4); font-size: 20px; cursor: pointer; text-align: center; }
        .nav-item.active { color: var(--gold); }
        .nav-item span { display: block; font-size: 8px; margin-top: 4px; }

        .search-input { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 15px; outline: none; }
        .theme-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body id="mainBody">

    <div class="top-bar">
        <span>🕒 صلاة العصر: 03:45 م</span>
        <span>✨ ربي زدني علماً</span>
    </div>

    <div class="main-header">
        <button class="theme-btn" onclick="togglePattern()"><i class="fa-solid fa-palette"></i></button>
        <h1 style="margin:0; font-size: 26px;">بوابة النخبة V8</h1>
        <p id="wisdomText" style="font-size: 11px; opacity: 0.9; margin-top: 10px;">"العلم نور يقذفه الله في القلب"</p>
    </div>

    <div class="profile-card">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img id="u-img" src="https://via.placeholder.com/70" class="avatar">
            <div>
                <h2 id="u-name" style="margin:0; font-size: 18px;">طالب العلم</h2>
                <span id="rank-tag" style="font-size: 10px; background: var(--gold); padding: 2px 8px; border-radius: 5px;">مبتدئ</span>
            </div>
        </div>
        <div class="progress-box">
            <div style="display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 5px;">
                <span>التقدم نحو رتبة "عالم"</span>
                <span id="time-display">0 دقيقة</span>
            </div>
            <div class="bar-bg"><div id="bar-fill" class="bar-fill"></div></div>
        </div>
    </div>

    <div class="tasbih-v8" id="tasbihArea">
        <div>
            <span style="font-size: 11px; color: #888;">التسبيح التفاعلي</span>
            <b id="ts-count" style="font-size: 28px; display: block; color: var(--primary);">0</b>
        </div>
        <button onclick="countTasbih(event)" style="background: var(--primary); color: white; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);">
            <i class="fa-solid fa-hand-pointer"></i>
        </button>
    </div>

    <div id="home-page" class="page active">
        <div class="grid">
            <div class="card" onclick="openYear('السنة الأولى')"><i class="fa-solid fa-book-atlas"></i><b>السنة الأولى</b></div>
            <div class="card" onclick="openYear('السنة الثانية')"><i class="fa-solid fa-award"></i><b>السنة الثانية</b></div>
            <div class="card" onclick="showPage('quiz-page', document.querySelector('.fa-lightbulb'))"><i class="fa-solid fa-lightbulb"></i><b>اختبار سريع</b></div>
            <div class="card" onclick="showPage('notes-page', document.querySelector('.fa-pen-clip'))"><i class="fa-solid fa-pen-clip"></i><b>خزانة الفوائد</b></div>
        </div>
    </div>

    <div id="items-page" class="page">
        <h2 id="items-title" style="text-align: center; color: var(--primary);"></h2>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="btn-ans active" id="tab-sh" onclick="switchDept('sh')" style="background: var(--primary); color: white;">الشريعة</button>
            <button class="btn-ans" id="tab-da" onclick="switchDept('da')">الدعوة</button>
        </div>
        <input type="text" id="search" class="search-input" placeholder="بحث سريع..." onkeyup="renderItems()">
        <div class="grid" id="items-container"></div>
        <button onclick="showPage('home-page', document.querySelector('.fa-house'))" style="width:100%; padding:15px; border-radius:15px; background: var(--dark-bg); color: white; border: none; margin-top: 20px;">العودة</button>
    </div>

    <div id="quiz-page" class="page">
        <div class="quiz-box">
            <h3 id="q-text">ما هي عاصمة الدولة الأموية؟</h3>
            <div id="q-options">
                <button class="btn-ans" onclick="checkAns(true)">دمشق</button>
                <button class="btn-ans" onclick="checkAns(false)">بغداد</button>
            </div>
        </div>
    </div>

    <div id="notes-page" class="page">
        <div class="card">
            <textarea id="note-input" style="width:100%; border:1px solid #eee; border-radius:15px; padding:10px; outline:none;" rows="3" placeholder="دوّن فائدة..."></textarea>
            <button onclick="addNote()" style="width:100%; background: var(--gold); border: none; padding: 12px; border-radius: 10px; margin-top: 10px; font-weight: bold;">حفظ +</button>
            <button onclick="copyAllNotes()" style="width:100%; background: var(--accent); border: none; padding: 12px; border-radius: 10px; margin-top: 5px; color:white;">نسخ للمشاركة 📋</button>
        </div>
        <div id="notes-list" style="margin-top: 15px;"></div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showPage('home-page', this)"><i class="fa-solid fa-house"></i><span>الرئيسية</span></div>
        <div class="nav-item" onclick="showPage('notes-page', this)"><i class="fa-solid fa-pen-clip"></i><span>المفكرة</span></div>
        <div class="nav-item" onclick="showPage('quiz-page', this)"><i class="fa-solid fa-lightbulb"></i><span>اختبار</span></div>
        <div class="nav-item" onclick="tg.openTelegramLink('https://t.me/YourSupport')"><i class="fa-solid fa-headset"></i><span>دعم</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // 1. نظام الوقت والتقدم
        let studyTime = parseInt(localStorage.getItem('study_v8')) || 0;
        function updateUI() {
            document.getElementById('time-display').innerText = studyTime + " دقيقة";
            let fill = (studyTime / 60) * 100;
            document.getElementById('bar-fill').style.width = Math.min(fill, 100) + "%";
            if(studyTime > 20) document.getElementById('rank-tag').innerText = "مجتهد";
            if(studyTime > 50) document.getElementById('rank-tag').innerText = "عالم";
        }
        setInterval(() => { studyTime++; localStorage.setItem('study_v8', studyTime); updateUI(); }, 60000);
        updateUI();

        // 2. السبحة الحركية
        let count = parseInt(localStorage.getItem('ts_v8')) || 0;
        document.getElementById('ts-count').innerText = count;
        function countTasbih(e) {
            count++;
            document.getElementById('ts-count').innerText = count;
            localStorage.setItem('ts_v8', count);
            tg.HapticFeedback.impactOccurred('medium');
            
            // انيميشن الحبة
            const bead = document.createElement('div');
            bead.className = 'bead';
            bead.style.left = (e.clientX - 6) + 'px';
            bead.style.top = (e.clientY - 6) + 'px';
            bead.style.animation = 'beadFly 0.6s forwards';
            document.body.appendChild(bead);
            setTimeout(() => bead.remove(), 600);
        }

        // 3. نظام المواد (12 مادة)
        const materials = {
            sh: ["الفقه المالكي", "أصول الفقه", "القواعد الفقهية", "المواريث", "فقه المعاملات", "فقه الجنايات", "فقه العبادات", "فقه الأسرة", "تاريخ التشريع", "أصول البحث", "القضاء الشرعي", "مقاصد الشريعة"],
            da: ["تفسير الأحكام", "علوم الحديث", "أصول الدعوة", "مقارنة الأديان", "السيرة النبوية", "العقيدة والتوحيد", "اللغة العربية", "النحو والصرف", "البلاغة", "المنطق", "الأخلاق والسلوك", "الملل والنحل"]
        };
        let currentDept = 'sh';
        function openYear(y) { document.getElementById('items-title').innerText = y; renderItems(); showPage('items-page'); }
        function switchDept(d) {
            currentDept = d;
            document.getElementById('tab-sh').style.background = d === 'sh' ? 'var(--primary)' : '#f1f5f9';
            document.getElementById('tab-da').style.background = d === 'da' ? 'var(--primary)' : '#f1f5f9';
            renderItems();
        }
        function renderItems() {
            const q = document.getElementById('search').value;
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            materials[currentDept].filter(m => m.includes(q)).forEach(m => {
                container.innerHTML += `<div class="card" onclick="tg.showAlert('جاري تحميل درس: ${m}')"><i class="fa-solid fa-file-pdf"></i><b>${m}</b></div>`;
            });
        }

        // 4. نظام الاختبارات السريعة
        function checkAns(isCorrect) {
            if(isCorrect) {
                tg.showAlert("إجابة صحيحة! بارك الله فيك ✅");
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                tg.showAlert("إجابة خاطئة، حاول مرة أخرى ❌");
            }
        }

        // 5. المفكرة السحابية (نسخ)
        let notes = JSON.parse(localStorage.getItem('notes_v8')) || [];
        function renderNotes() {
            const list = document.getElementById('notes-list');
            list.innerHTML = '';
            notes.forEach((n, i) => {
                list.innerHTML += `<div class="card" style="text-align:right; margin-bottom:10px;">${n} <i class="fa-solid fa-trash" style="color:red; float:left;" onclick="deleteNote(${i})"></i></div>`;
            });
        }
        function addNote() {
            const text = document.getElementById('note-input').value;
            if(text) { notes.push(text); localStorage.setItem('notes_v8', JSON.stringify(notes)); document.getElementById('note-input').value=''; renderNotes(); }
        }
        function deleteNote(i) { notes.splice(i,1); localStorage.setItem('notes_v8', JSON.stringify(notes)); renderNotes(); }
        function copyAllNotes() {
            const allNotes = notes.join('\n---\n');
            navigator.clipboard.writeText(allNotes);
            tg.showAlert("تم نسخ جميع الفوائد! يمكنك لصقها في رسائل تليجرام 📋");
        }
        renderNotes();

        // 6. تغيير النمط (أندلسي / حديث)
        function togglePattern() {
            document.getElementById('mainBody').classList.toggle('andalusian-pattern');
            tg.HapticFeedback.impactOccurred('light');
        }

        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(btn) { document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); btn.classList.add('active'); }
            tg.HapticFeedback.impactOccurred('light');
        }

        // بيانات المستخدم
        const user = tg.initDataUnsafe?.user;
        if(user) {
            document.getElementById('u-name').innerText = user.first_name;
            if(user.photo_url) document.getElementById('u-img').src = user.photo_url;
        }
    </script>
</body>
</html>
