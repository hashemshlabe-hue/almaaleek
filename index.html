<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Gateway V10 | بوابة النخبة الدولية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --p-dark: #0f172a; --p-main: #1e293b; --p-accent: #6366f1;
            --gold: #f59e0b; --glass: rgba(255, 255, 255, 0.03);
            --text: #f8fafc;
        }

        body { 
            background: #020617; color: var(--text); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* خلفية سينمائية متحركة */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #1e293b, #020617);
            z-index: -1;
        }

        /* شريط المعلومات العلوي - تليجرام ستايل */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000;
        }

        /* بطاقة الطالب الدولية - تصميم فائق الاحترافية */
        .student-id-card {
            margin: 20px; background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 30px; padding: 25px; border: 1px solid rgba(255,255,255,0.1);
            position: relative; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .student-id-card::before {
            content: "ELITE UNIVERSITY"; position: absolute; top: -10px; right: -10px;
            font-size: 40px; font-weight: 900; opacity: 0.03; transform: rotate(-15deg);
        }

        .profile-flex { display: flex; align-items: center; gap: 20px; }
        .avatar-box {
            width: 80px; height: 80px; border-radius: 20px;
            border: 2px solid var(--gold); padding: 3px; position: relative;
        }
        .avatar-box img { width: 100%; height: 100%; border-radius: 15px; object-fit: cover; }
        .status-dot { 
            position: absolute; bottom: -5px; right: -5px; width: 15px; height: 15px;
            background: #22c55e; border: 3px solid var(--p-dark); border-radius: 50%;
        }

        .id-details h2 { margin: 0; font-size: 20px; letter-spacing: 0.5px; }
        .id-details p { margin: 5px 0; font-size: 12px; opacity: 0.6; }
        
        .xp-container { margin-top: 15px; background: rgba(0,0,0,0.2); height: 6px; border-radius: 10px; }
        .xp-bar { height: 100%; background: var(--gold); border-radius: 10px; width: 45%; box-shadow: 0 0 10px var(--gold); }

        /* منطقة الورد والذكر التفاعلية */
        .dhikr-sphere {
            height: 200px; margin: 20px; background: rgba(255,255,255,0.02);
            border-radius: 40px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
            border: 1px dashed rgba(255,255,255,0.1); cursor: pointer;
        }
        .dhikr-sphere b { font-size: 60px; font-weight: 900; color: var(--text); text-shadow: 0 0 20px rgba(99,102,241,0.5); }
        
        /* شبكة الخدمات الجامعية */
        .university-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px;
            padding-bottom: 120px;
        }
        .uni-card {
            background: rgba(255,255,255,0.03); padding: 25px 15px; border-radius: 25px;
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .uni-card:active { transform: scale(0.95); background: rgba(255,255,255,0.08); }
        .uni-card i { font-size: 30px; margin-bottom: 12px; display: block; color: var(--gold); }
        .uni-card span { font-size: 13px; font-weight: 600; display: block; }
        .uni-card small { font-size: 9px; opacity: 0.4; }

        /* القائمة السفلية العائمة */
        .floating-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px); border-radius: 25px;
            display: flex; justify-content: space-around; padding: 15px;
            border: 1px solid rgba(255,255,255,0.1); z-index: 2000;
        }
        .nav-btn { color: rgba(255,255,255,0.4); font-size: 20px; text-align: center; border: none; background: none; }
        .nav-btn.active { color: var(--gold); }
        .nav-btn span { display: block; font-size: 9px; margin-top: 5px; }

        /* أنيميشن */
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .float-icon { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="top-bar">
        <i class="fa-solid fa-bars-staggered" style="font-size: 20px;"></i>
        <div style="font-size: 14px; font-weight: bold; color: var(--gold);">بوابة النخبة V10</div>
        <i class="fa-solid fa-bell" onclick="tg.showAlert('لا توجد إشعارات جديدة')"></i>
    </div>

    <div class="student-id-card">
        <div class="profile-flex">
            <div class="avatar-box">
                <img id="u-img" src="https://via.placeholder.com/100">
                <div class="status-dot"></div>
            </div>
            <div class="id-details">
                <h2 id="u-name">هاشم شلابي</h2>
                <p><i class="fa-solid fa-id-card-clip"></i> <span id="u-id">#ELITE-2083-LY</span></p>
                <div style="display: flex; gap: 5px;">
                    <span style="font-size: 9px; background: var(--p-accent); padding: 2px 8px; border-radius: 5px;">باحث أكاديمي</span>
                    <span id="u-spec-tag" style="font-size: 9px; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 5px;">شريعة</span>
                </div>
            </div>
        </div>
        <div class="xp-container">
            <div class="xp-bar"></div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 9px; margin-top: 5px; opacity: 0.5;">
            <span>المستوى 12</span>
            <span>450 / 1000 XP</span>
        </div>
    </div>

    <div class="dhikr-sphere" onclick="triggerDhikr()">
        <span style="font-size: 11px; opacity: 0.5; position: absolute; top: 20px;">اضغط في أي مكان لتسجيل الورد</span>
        <b id="ts-count">0</b>
        <div class="float-icon" style="position: absolute; bottom: 20px; color: var(--gold); opacity: 0.3;">
            <i class="fa-solid fa-fingerprint"></i>
        </div>
    </div>

    <div class="university-grid">
        <div class="uni-card" onclick="tg.showAlert('قاعة المحاضرات الرقمية')">
            <i class="fa-solid fa-chalkboard-user"></i>
            <span>المحاضرات</span>
            <small>12 مادة نشطة</small>
        </div>
        <div class="uni-card" onclick="tg.showAlert('مكتبة المخطوطات والكتب')">
            <i class="fa-solid fa-book-atlas"></i>
            <span>المكتبة</span>
            <small>+500 كتاب</small>
        </div>
        <div class="uni-card" onclick="tg.showAlert('خزانة الفوائد والتقييدات')">
            <i class="fa-solid fa-box-archive"></i>
            <span>خزانة الفوائد</span>
            <small>24 فائدة مقيدة</small>
        </div>
        <div class="uni-card" onclick="tg.showAlert('نظام الاختبارات الدولية')">
            <i class="fa-solid fa-vial-circle-check"></i>
            <span>الاختبارات</span>
            <small>متاح الآن</small>
        </div>
        <div class="uni-card" onclick="tg.showAlert('الخلوة الذكية قيد التطوير')">
            <i class="fa-solid fa-spa"></i>
            <span>الخلوة</span>
            <small>وضع التركيز</small>
        </div>
        <div class="uni-card" onclick="changeSpec()">
            <i class="fa-solid fa-rotate"></i>
            <span>تغيير التخصص</span>
            <small id="current-spec-display">شريعة</small>
        </div>
    </div>

    <div class="floating-nav">
        <button class="nav-btn active"><i class="fa-solid fa-house-user"></i><span>الرئيسية</span></button>
        <button class="nav-btn" onclick="tg.showAlert('المفكرة الأكاديمية قيد التجهيز')"><i class="fa-solid fa-feather"></i><span>المفكرة</span></button>
        <button class="nav-btn" onclick="tg.shareExternal()"><i class="fa-solid fa-share-nodes"></i><span>مشاركة</span></button>
        <button class="nav-btn" onclick="tg.showAlert('الملف الشخصي الدولي')"><i class="fa-solid fa-user-graduate"></i><span>بروفايلي</span></button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#0f172a');

        let tsCount = parseInt(localStorage.getItem('v10_ts')) || 0;
        let spec = localStorage.getItem('v10_spec') || 'شريعة';

        document.getElementById('ts-count').innerText = tsCount;
        document.getElementById('u-spec-tag').innerText = spec;
        document.getElementById('current-spec-display').innerText = spec;

        function triggerDhikr() {
            tsCount++;
            document.getElementById('ts-count').innerText = tsCount;
            localStorage.setItem('v10_ts', tsCount);
            tg.HapticFeedback.impactOccurred('heavy');
            
            // تأثير بصري للرقم
            const el = document.getElementById('ts-count');
            el.style.transform = 'scale(1.2)';
            setTimeout(() => el.style.transform = 'scale(1)', 100);
        }

        function changeSpec() {
            spec = (spec === 'شريعة') ? 'دعوة وأصول الدين' : 'شريعة';
            document.getElementById('u-spec-tag').innerText = spec;
            document.getElementById('current-spec-display').innerText = spec;
            localStorage.setItem('v10_spec', spec);
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert('تم تغيير المسار الأكاديمي إلى: ' + spec);
        }

        // جلب بيانات المستخدم الحقيقية
        const user = tg.initDataUnsafe?.user;
        if(user) {
            document.getElementById('u-name').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            if(user.photo_url) document.getElementById('u-img').src = user.photo_url;
        }
    </script>
</body>
</html>
