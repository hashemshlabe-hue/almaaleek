<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة النخبة - V5.8</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a2a6c;
            --gold: #d4af37;
            --dark: #0f172a;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg); margin: 0; padding: 0; color: var(--dark);
            user-select: none;
        }

        /* شريط الأذكار */
        .top-dhikr {
            background: var(--primary); color: white; padding: 8px 0;
            font-size: 12px; overflow: hidden; white-space: nowrap;
            border-bottom: 2px solid var(--gold);
        }
        .scroll-text { display: inline-block; padding-left: 100%; animation: scroll 30s linear infinite; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(100%); } }

        /* بروفايل الواجهة المطور */
        .main-header {
            background: linear-gradient(135deg, var(--primary) 0%, #2a48b1 100%);
            padding: 40px 20px 80px; color: white; text-align: center; border-radius: 0 0 50px 50px;
        }
        .user-profile-box {
            background: white; margin: -50px 20px 20px; padding: 20px;
            border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex; align-items: center; gap: 15px; color: var(--dark);
        }
        .user-avatar { width: 70px; height: 70px; border-radius: 20px; border: 2px solid var(--gold); object-fit: cover; }
        .user-info h2 { margin: 0; font-size: 18px; color: var(--primary); }
        .user-info p { margin: 3px 0 0; font-size: 12px; color: #888; font-weight: bold; }

        /* السبحة الإلكترونية */
        .tasbih-card {
            background: white; margin: 0 20px 20px; padding: 15px;
            border-radius: 25px; border: 1px solid var(--gold);
            display: flex; justify-content: space-between; align-items: center;
        }
        .counter-btn {
            background: var(--primary); color: white; width: 50px; height: 50px;
            border-radius: 50%; border: none; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .page { display: none; padding: 0 20px 100px; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* أزرار السنوات */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .card {
            background: white; padding: 25px 15px; border-radius: 25px;
            text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02); transition: 0.3s;
        }
        .card:active { transform: scale(0.95); }
        .card i { font-size: 30px; color: var(--primary); margin-bottom: 10px; display: block; }

        /* التبويبات (شريعة / دعوة) */
        .tab-bar {
            display: flex; background: #eee; border-radius: 15px; padding: 5px; margin: 15px 0;
        }
        .tab-btn {
            flex: 1; padding: 10px; border: none; border-radius: 12px;
            font-weight: bold; background: transparent; transition: 0.3s;
        }
        .tab-btn.active { background: var(--primary); color: white; }

        /* شريط البحث */
        .search-box {
            width: 100%; padding: 12px 40px 12px 15px; border-radius: 15px;
            border: 1px solid #ddd; margin-bottom: 15px; outline: none; box-sizing: border-box;
        }

        .nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: var(--dark); padding: 15px; border-radius: 25px;
            display: flex; justify-content: space-around; z-index: 1000;
        }
        .nav-item { color: rgba(255,255,255,0.5); font-size: 22px; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

    <div class="top-dhikr">
        <div class="scroll-text">📿 "ألا بذكر الله تطمئن القلوب" • سبحان الله وبحمده • ربي زدني علماً • اللهم صل على محمد 📿</div>
    </div>

    <div class="main-header">
        <h1 style="margin:0; font-size: 24px;">بوابة النخبة</h1>
        <p style="opacity:0.8; font-size:11px;">كلية الإمام مالك</p>
    </div>

    <div class="user-profile-box">
        <img id="u-img" src="https://via.placeholder.com/70" class="user-avatar">
        <div class="user-info">
            <h2 id="u-name">طالب العلم</h2>
            <p id="u-id">ID: 0000000000</p>
        </div>
    </div>

    <div class="tasbih-card">
        <div>
            <span style="font-size:11px; color:#888; display:block;">السبحة الإلكترونية</span>
            <b id="ts-count" style="font-size:20px; color:var(--primary);">0</b>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="counter-btn" style="background:#888; width:35px; height:35px; font-size:14px;" onclick="resetTasbih()"><i class="fas fa-undo"></i></button>
            <button class="counter-btn" onclick="countTasbih()"><i class="fas fa-fingerprint"></i></button>
        </div>
    </div>

    <div id="home-page" class="page active">
        <div class="grid">
            <div class="card" onclick="openYear('السنة الأولى')"><i class="fas fa-book-open"></i><b>السنة الأولى</b></div>
            <div class="card" onclick="openYear('السنة الثانية')"><i class="fas fa-scroll"></i><b>السنة الثانية</b></div>
            <div class="card" onclick="showPage('notes-page', document.querySelector('.fa-pen-nib'))"><i class="fas fa-pen-nib"></i><b>المفكرة</b></div>
            <div class="card" onclick="tg.openTelegramLink('https://t.me/news')"><i class="fas fa-bullhorn"></i><b>الأخبار</b></div>
        </div>
    </div>

    <div id="items-page" class="page">
        <h2 id="items-title" style="color:var(--primary); text-align: center;"></h2>
        
        <div class="tab-bar">
            <button class="tab-btn active" id="tab-sh" onclick="switchDept('sh')">قسم الشريعة</button>
            <button class="tab-btn" id="tab-da" onclick="switchDept('da')">الدعوة وأصول الدين</button>
        </div>

        <div style="position:relative;">
            <i class="fas fa-search" style="position:absolute; left:15px; top:13px; color:#ccc;"></i>
            <input type="text" class="search-box" id="search" placeholder="ابحث عن مادة..." onkeyup="filterItems()">
        </div>

        <div class="grid" id="items-container"></div>
        <button onclick="showPage('home-page', document.querySelector('.fa-home'))" style="background:var(--dark); color:white; border:none; padding:15px; border-radius:15px; width:100%; margin-top:20px; font-weight:bold;">🔙 العودة للرئيسية</button>
    </div>

    <div id="notes-page" class="page">
        <div class="card">
            <h3><i class="fas fa-feather"></i> مفكرة الفوائد</h3>
            <textarea id="user-note" style="width:100%; height:150px; border-radius:15px; border:1px solid #ddd; padding:10px; outline:none;" placeholder="اكتب فوائدك هنا..."></textarea>
            <button onclick="saveNote()" style="background:var(--gold); border:none; padding:10px; border-radius:10px; width:100%; margin-top:10px; font-weight:bold;">حفظ ✅</button>
        </div>
    </div>

    <div class="nav">
        <i class="fas fa-home nav-item active" onclick="showPage('home-page', this)"></i>
        <i class="fas fa-pen-nib nav-item" onclick="showPage('notes-page', this)"></i>
        <i class="fas fa-share-alt nav-item" onclick="tg.shareExternal()"></i>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        tg.setHeaderColor('#1a2a6c');

        // بيانات المستخدم
        const user = tg.initDataUnsafe?.user;
        if(user) {
            document.getElementById('u-name').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('u-id').innerText = "ID: " + user.id;
            if(user.photo_url) document.getElementById('u-img').src = user.photo_url;
        }

        // نظام السبحة
        let count = parseInt(localStorage.getItem('ts_count')) || 0;
        document.getElementById('ts-count').innerText = count;
        function countTasbih() {
            count++;
            document.getElementById('ts-count').innerText = count;
            localStorage.setItem('ts_count', count);
            tg.HapticFeedback.impactOccurred('medium');
        }
        function resetTasbih() {
            count = 0;
            document.getElementById('ts-count').innerText = count;
            localStorage.setItem('ts_count', 0);
        }

        // إدارة المواد والأقسام
        let currentYear = "";
        let currentDept = "sh";
        const data = {
            sh: ["الفقه المالكي", "أصول الفقه", "القواعد الفقهية", "المواريث", "المعاملات", "الجنايات"],
            da: ["تفسير آيات الأحكام", "علوم الحديث", "أصول الدعوة", "مقارنة الأديان", "السيرة النبوية", "العقيدة"]
        };

        function openYear(year) {
            currentYear = year;
            document.getElementById('items-title').innerText = year;
            renderItems();
            showPage('items-page');
        }

        function switchDept(dept) {
            currentDept = dept;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + dept).classList.add('active');
            renderItems();
            tg.HapticFeedback.impactOccurred('light');
        }

        function renderItems(filter = "") {
            const cont = document.getElementById('items-container');
            cont.innerHTML = '';
            const list = data[currentDept].filter(m => m.includes(filter));
            list.forEach(m => {
                cont.innerHTML += `<div class="card" onclick="tg.openTelegramLink('https://t.me/channel')"><i class="fas fa-file-pdf"></i><b>${m}</b></div>`;
            });
        }

        function filterItems() {
            renderItems(document.getElementById('search').value);
        }

        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(btn) {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                btn.classList.add('active');
            }
        }

        function saveNote() {
            localStorage.setItem('v58_note', document.getElementById('user-note').value);
            tg.showAlert('تم الحفظ!');
        }
        document.getElementById('user-note').value = localStorage.getItem('v58_note') || '';
    </script>
</body>
</html>
