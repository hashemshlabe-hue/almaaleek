<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة النخبة الأكاديمية - الألوان الهادئة</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f0f4f8; /* لون خلفية سماوي فاتح جداً */
            --card: #ffffff; /* بطاقات بيضاء ناصعة */
            --accent: #54a0ff; /* أزرق سماوي مريح */
            --accent-glow: rgba(84, 160, 255, 0.2);
            --text-main: #2d3436; /* رمادي غامق للنصوص مريح للعين */
            --text-sub: #636e72;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg); color: var(--text-main);
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* بروفايل المستخدم الفاخر */
        .user-section {
            background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
            padding: 40px 20px 20px; text-align: center;
            border-bottom: 2px solid var(--accent-glow);
        }

        .avatar-box {
            width: 90px; height: 90px; border-radius: 30px;
            margin: 0 auto 15px; border: 3px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); overflow: hidden;
        }

        .user-status {
            display: inline-block; padding: 6px 18px; border-radius: 20px;
            background: var(--accent); color: #fff; font-weight: bold; font-size: 11px;
            margin-top: 10px; box-shadow: 0 4px 15px var(--accent-glow);
            cursor: pointer;
        }

        /* إحصائيات عامة */
        .global-stats {
            display: flex; justify-content: center; gap: 20px; margin: 20px 0;
            font-size: 12px; color: var(--accent); font-weight: 500;
        }

        /* الشبكة الرئيسية */
        .main-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; padding: 20px;
        }

        .item-card {
            background: var(--card); border-radius: 20px; padding: 20px;
            border: 1px solid rgba(0,0,0,0.03); text-align: center;
            transition: 0.3s; position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .item-card:active { transform: scale(0.95); background: #fdfdfd; border-color: var(--accent); }
        .item-card i { font-size: 28px; color: var(--accent); margin-bottom: 10px; display: block; }
        .counter-label { font-size: 10px; color: var(--text-sub); margin-top: 5px; display: block; }

        /* واجهة الـ 12 عنصراً */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 1000; padding: 20px; box-sizing: border-box;
            overflow-y: auto;
        }

        .grid-12 {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }

        .sub-item {
            background: #fff; padding: 15px; border-radius: 15px;
            font-size: 13px; border-right: 4px solid var(--accent);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            color: var(--text-main);
        }

        .close-btn { color: var(--accent); margin-bottom: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        /* شريط سفلي */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: #fff;
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 1px solid var(--accent-glow);
            box-shadow: 0 -5px 15px rgba(0,0,0,0.03);
        }
        
        .nav-icon { color: var(--text-sub); font-size: 18px; }
        .nav-icon.active { color: var(--accent); }
    </style>
</head>
<body>

    <div class="user-section">
        <div class="avatar-box"><img id="u-pic" src="https://via.placeholder.com/90" style="width:100%"></div>
        <h2 id="u-name" style="margin:0;">طالب العلم</h2>
        <div id="u-dept" style="color: var(--text-sub); font-size: 14px; margin-top:5px;">بانتظار تحديد القسم...</div>
        <div class="user-status" onclick="setDept()">إعداد التخصص ⚙️</div>
        
        <div class="global-stats">
            <span><i class="fas fa-users"></i> المتصلون: 184</span>
            <span><i class="fas fa-eye"></i> الزوار: 12,450</span>
        </div>
    </div>

    <div class="main-grid">
        <div class="item-card" onclick="open12('سنة أولى')">
            <i class="fas fa-graduation-cap"></i>
            <b>السنة الأولى</b>
            <span class="counter-label">👤 5,230 طالب</span>
        </div>
        <div class="item-card" onclick="open12('سنة ثانية')">
            <i class="fas fa-award"></i>
            <b>السنة الثانية</b>
            <span class="counter-label">👤 4,890 طالب</span>
        </div>
        <div class="item-card" onclick="tg.openTelegramLink('https://t.me/your_library')">
            <i class="fas fa-book-reader"></i>
            <b>المكتبة الهادئة</b>
            <span class="counter-label">📚 850 ملف</span>
        </div>
        <div class="item-card" onclick="tg.openTelegramLink('https://t.me/your_ads')">
            <i class="fas fa-lightbulb"></i>
            <b>التنبيهات</b>
            <span class="counter-label">✨ جديد اليوم</span>
        </div>
    </div>

    <div id="view-12" class="overlay">
        <div class="close-btn" onclick="close12()"><i class="fas fa-arrow-right"></i> العودة للرئيسية</div>
        <h3 id="view-title" style="color: var(--accent); margin-bottom: 20px;"></h3>
        <div class="grid-12" id="grid-content">
            </div>
    </div>

    <div class="bottom-nav">
        <i class="fas fa-home nav-icon active"></i>
        <i class="fas fa-share-nodes nav-icon" onclick="tg.shareExternal()"></i>
        <i class="fas fa-user-gear nav-icon" onclick="setDept()"></i>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        tg.setHeaderColor('#ffffff');

        // بيانات المستخدم
        const user = tg.initDataUnsafe?.user;
        if(user) {
            document.getElementById('u-name').innerText = user.first_name;
            if(user.photo_url) document.getElementById('u-pic').src = user.photo_url;
        }

        // اختيار التخصص
        function setDept() {
            tg.showPopup({
                title: 'تخصيص الملف',
                message: 'اختر قسمك الأكاديمي:',
                buttons: [
                    {id: 's', type: 'default', text: 'قسم الشريعة'},
                    {id: 'd', type: 'default', text: 'الدعوة وأصول الدين'}
                ]
            }, (id) => {
                if(id) {
                    const dept = id === 's' ? 'تخصص: الشريعة الإسلامية' : 'تخصص: الدعوة وأصول الدين';
                    document.getElementById('u-dept').innerText = dept;
                    localStorage.setItem('myDept', dept);
                    tg.HapticFeedback.notificationOccurred('success');
                }
            });
        }

        if(localStorage.getItem('myDept')) {
            document.getElementById('u-dept').innerText = localStorage.getItem('myDept');
        }

        // نظام الـ 12 عنصراً
        function open12(title) {
            tg.HapticFeedback.impactOccurred('medium');
            document.getElementById('view-title').innerText = title;
            const container = document.getElementById('grid-content');
            container.innerHTML = '';
            
            for(let i=1; i<=12; i++) {
                container.innerHTML += `
                    <div class="sub-item" onclick="tg.openTelegramLink('https://t.me/channel')">
                        <i class="fas fa-circle-chevron-left" style="font-size:12px; color:var(--accent); margin-left:8px;"></i>
                        مادة دراسية ${i}
                    </div>
                `;
            }
            document.getElementById('view-12').style.display = 'block';
        }

        function close12() { document.getElementById('view-12').style.display = 'none'; }
    </script>
</body>
</html>
