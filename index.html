<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Nexus OS | البنية التحتية المتكاملة</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00f2ff; --neon-gold: #ffcf33; --bg: #050505;
            --glass: rgba(255, 255, 255, 0.07); --card-bg: #0f172a;
        }

        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; padding: 0; overflow: hidden; height: 100vh;
        }

        /* حاوية الصفحات */
        .app-container { height: 100vh; overflow-y: auto; padding-bottom: 100px; scroll-behavior: smooth; }

        /* شاشات الأنظمة (Modals) */
        .system-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 5000; display: none;
            flex-direction: column; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .overlay-header {
            padding: 20px; background: var(--card-bg); display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass);
        }

        /* تصميم البطاقات المطور */
        .nexus-card {
            margin: 15px; background: var(--glass); border-radius: 25px;
            padding: 20px; border: 1px solid rgba(255,255,255,0.1);
        }

        /* نظام الدردشة */
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 18px; border-radius: 15px; max-width: 80%; font-size: 14px; }
        .msg.sent { background: var(--neon-blue); color: black; align-self: flex-start; }
        .msg.received { background: var(--glass); align-self: flex-end; }
        .chat-input-area { padding: 15px; background: #111; display: flex; gap: 10px; }
        .chat-input { flex: 1; background: var(--glass); border: none; padding: 12px; border-radius: 12px; color: white; outline: none; }

        /* نظام الاختبارات */
        .quiz-card { background: var(--card-bg); padding: 20px; border-radius: 20px; margin-top: 20px; }
        .option-btn {
            width: 100%; padding: 15px; margin: 8px 0; background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white;
            text-align: right; cursor: pointer; transition: 0.2s;
        }
        .option-btn:active { background: var(--neon-blue); color: black; }

        /* الشبكة الرئيسية */
        .main-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; }
        .grid-item {
            background: var(--card-bg); padding: 20px 10px; border-radius: 20px;
            text-align: center; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
        }
        .grid-item i { font-size: 24px; color: var(--neon-gold); margin-bottom: 8px; display: block; }
        .grid-item span { font-size: 11px; opacity: 0.8; }

        .nav-bar {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: rgba(15,23,42,0.9); backdrop-filter: blur(20px);
            height: 70px; border-radius: 25px; display: flex;
            justify-content: space-around; align-items: center; z-index: 4000;
        }
        .nav-link { color: #555; text-align: center; text-decoration: none; font-size: 18px; }
        .nav-link.active { color: var(--neon-blue); }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="nexus-card" style="background: linear-gradient(135deg, #0f172a, #1e293b);">
            <div style="display: flex; align-items: center; gap: 15px;">
                <img id="u-img" src="https://via.placeholder.com/60" style="width: 60px; height: 60px; border-radius: 15px; border: 2px solid var(--neon-gold);">
                <div>
                    <h3 id="u-name" style="margin:0;">هاشم شلابي</h3>
                    <div style="font-size: 11px; color: var(--neon-blue);" id="u-rank">طالب مبتدئ | مستوى 1</div>
                </div>
            </div>
            <div style="margin-top: 15px; height: 4px; background: rgba(0,0,0,0.3); border-radius: 10px;">
                <div id="xp-progress" style="width: 10%; height: 100%; background: var(--neon-gold); box-shadow: 0 0 10px var(--neon-gold);"></div>
            </div>
        </div>

        <div class="main-grid">
            <div class="grid-item" onclick="openSystem('quiz')"><i class="fa-solid fa-vial"></i><span>الاختبارات</span></div>
            <div class="grid-item" onclick="openSystem('chat-boys')"><i class="fa-solid fa-mars"></i><span>دردشة الأولاد</span></div>
            <div class="grid-item" onclick="openSystem('chat-girls')"><i class="fa-solid fa-venus"></i><span>دردشة البنات</span></div>
            <div class="grid-item" onclick="openSystem('library')"><i class="fa-solid fa-book-quran"></i><span>المكتبة</span></div>
            <div class="grid-item" onclick="openSystem('notes')"><i class="fa-solid fa-pen-nib"></i><span>الفوائد</span></div>
            <div class="grid-item" onclick="openSystem('stats')"><i class="fa-solid fa-chart-pie"></i><span>الإحصائيات</span></div>
        </div>

        <div class="nexus-card" onclick="addDhikr()" style="text-align: center; padding: 40px; cursor: pointer;">
            <div style="font-size: 12px; opacity: 0.5; margin-bottom: 10px;">المحرك المركزي للورد</div>
            <div id="main-count" style="font-size: 60px; font-weight: 900; color: var(--neon-blue);">0</div>
        </div>
    </div>

    <div id="quiz-system" class="system-overlay">
        <div class="overlay-header">
            <button onclick="closeSystem()" style="background:none; border:none; color:white;"><i class="fa-solid fa-xmark"></i></button>
            <b>الاختبارات الأكاديمية</b>
            <span id="quiz-score">النقاط: 0</span>
        </div>
        <div style="padding: 20px;">
            <div id="question-box" class="quiz-card">
                <h3 id="q-text">هل أنت مستعد لبدء الاختبار؟</h3>
                <div id="options-container">
                    <button class="option-btn" onclick="startQuiz()">ابدأ الآن</button>
                </div>
            </div>
        </div>
    </div>

    <div id="chat-boys-system" class="system-overlay">
        <div class="overlay-header">
            <button onclick="closeSystem()" style="background:none; border:none; color:white;"><i class="fa-solid fa-xmark"></i></button>
            <b>مجلس النخبة (شباب)</b>
            <div style="width:10px; height:10px; background:#22c55e; border-radius:50%;"></div>
        </div>
        <div id="chat-content" class="chat-area">
            <div class="msg received">مرحباً بك في الدردشة العامة للطلاب.</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="msg-input" class="chat-input" placeholder="اكتب رسالتك هنا...">
            <button onclick="sendMsg()" style="background: var(--neon-blue); border:none; padding: 10px 20px; border-radius: 12px;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="library-system" class="system-overlay">
        <div class="overlay-header">
            <button onclick="closeSystem()" style="background:none; border:none; color:white;"><i class="fa-solid fa-xmark"></i></button>
            <b>المكتبة الشاملة</b>
        </div>
        <div style="padding: 15px; overflow-y: auto;" id="lib-list">
            </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-link active"><i class="fa-solid fa-microchip"></i></a>
        <a href="#" class="nav-link"><i class="fa-solid fa-compass"></i></a>
        <a href="#" class="nav-link" onclick="tg.shareExternal()"><i class="fa-solid fa-share-nodes"></i></a>
        <a href="#" class="nav-link"><i class="fa-solid fa-user-shield"></i></a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // قاعدة البيانات المحلية
        let stats = JSON.parse(localStorage.getItem('elite_stats')) || { xp: 0, count: 0, level: 1, notes: [] };
        const questions = [
            { q: "ما هي شروط صلاة الجماعة؟", a: ["النية", "المساواة", "المتابعة", "كل ما سبق"], r: 3 },
            { q: "من هو مؤلف كتاب الموطأ؟", a: ["الإمام الشافعي", "الإمام مالك", "الإمام أحمد", "الإمام أبو حنيفة"], r: 1 }
        ];

        // تحديث الواجهة الرئيسية
        function updateUI() {
            document.getElementById('main-count').innerText = stats.count;
            document.getElementById('u-rank').innerText = `طالب نخبة | مستوى ${stats.level}`;
            document.getElementById('xp-progress').style.width = (stats.xp % 100) + '%';
        }

        // محرك الذكر
        function addDhikr() {
            stats.count++; stats.xp += 2;
            if(stats.xp % 100 === 0) stats.level++;
            saveData(); updateUI();
            tg.HapticFeedback.impactOccurred('medium');
        }

        // محرك الأنظمة
        function openSystem(sys) {
            document.querySelectorAll('.system-overlay').forEach(s => s.style.display = 'none');
            const target = document.getElementById(sys + '-system');
            if(target) target.style.display = 'flex';
            
            if(sys === 'library') loadLibrary();
        }

        function closeSystem() {
            document.querySelectorAll('.system-overlay').forEach(s => s.style.display = 'none');
        }

        // محرك الدردشة
        function sendMsg() {
            const input = document.getElementById('msg-input');
            if(input.value) {
                const chat = document.getElementById('chat-content');
                chat.innerHTML += `<div class="msg sent">${input.value}</div>`;
                input.value = '';
                chat.scrollTop = chat.scrollHeight;
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        // محرك الاختبارات
        let currentQ = 0;
        function startQuiz() {
            const q = questions[currentQ];
            document.getElementById('q-text').innerText = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.a.forEach((opt, index) => {
                container.innerHTML += `<button class="option-btn" onclick="checkAnswer(${index})">${opt}</button>`;
            });
        }

        function checkAnswer(idx) {
            if(idx === questions[currentQ].r) {
                tg.showAlert("إجابة صحيحة! +20 XP");
                stats.xp += 20;
            } else {
                tg.showAlert("إجابة خاطئة، حاول مجدداً");
            }
            currentQ = (currentQ + 1) % questions.length;
            startQuiz();
            saveData();
        }

        // محرك المكتبة
        function loadLibrary() {
            const books = ["صحيح البخاري", "كتاب التوحيد", "بداية المجتهد", "الآجرومية", "متن أبي شجاع"];
            const list = document.getElementById('lib-list');
            list.innerHTML = '';
            books.forEach(book => {
                list.innerHTML += `
                    <div class="nexus-card" style="display:flex; justify-content:space-between; align-items:center;">
                        <span>${book}</span>
                        <button onclick="tg.showAlert('جاري تحميل الكتاب...')" style="background:var(--neon-gold); border:none; padding:5px 15px; border-radius:8px;">قراءة</button>
                    </div>`;
            });
        }

        function saveData() { localStorage.setItem('elite_stats', JSON.stringify(stats)); }
        
        // جلب بيانات تليجرام
        const user = tg.initDataUnsafe?.user;
        if(user) {
            document.getElementById('u-name').innerText = user.first_name;
            if(user.photo_url) document.getElementById('u-img').src = user.photo_url;
        }

        updateUI();
    </script>
</body>
</html>
</body>
</html>
