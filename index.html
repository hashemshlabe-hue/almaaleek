<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة النخبة V10.0 - الإمبراطورية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --primary: #1a2a6c; --gold: #d4af37; --accent: #7b2ff7;
            --bg: #f8fafc; --glass: rgba(255, 255, 255, 0.9); --dark-bg: #0f172a;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; transition: 0.5s; overflow-x: hidden; }
        .night-mode { --bg: #1e293b; --primary: #0f172a; --glass: rgba(30, 41, 59, 0.9); color: white; }
        .night-mode .card { background: #334155; color: white; border: none; }

        /* فقاعة رفيق الطالب الذكية */
        .ai-bubble { background: var(--gold); color: var(--primary); padding: 10px 20px; border-radius: 20px 20px 0 20px; margin: 10px 20px; font-size: 12px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.1); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        .main-header { background: linear-gradient(135deg, var(--primary), var(--accent)); padding: 40px 20px 80px; color: white; text-align: center; border-radius: 0 0 50px 50px; position: relative; }

        /* نظام التحدي اليومي */
        .challenge-box { background: var(--glass); backdrop-filter: blur(10px); margin: -50px 20px 20px; padding: 15px; border-radius: 25px; border: 2px solid var(--gold); }
        .challenge-item { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }

        /* بطاقة الهوية الملكية */
        #id-card { background: linear-gradient(45deg, #1a2a6c, #b8860b); color: white; padding: 20px; border-radius: 20px; display: none; text-align: center; position: relative; overflow: hidden; margin-bottom: 20px; }
        #id-card::after { content: 'الخبة'; position: absolute; opacity: 0.1; font-size: 80px; transform: rotate(-20deg); right: -10px; }

        /* السبحة المطورة جداً */
        .tasbih-area { background: var(--glass); margin: 0 20px 20px; padding: 30px; border-radius: 30px; text-align: center; cursor: pointer; position: relative; border: 2px solid transparent; transition: 0.3s; }
        .tasbih-area:active { transform: scale(0.96); border-color: var(--gold); }

        .page { display: none; padding: 0 20px 130px; animation: slideIn 0.5s forwards; }
        .page.active { display: block; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: var(--dark-bg); padding: 12px; border-radius: 25px; display: flex; justify-content: space-around; z-index: 1000; }
        .nav-item { color: rgba(255,255,255,0.4); text-align: center; cursor: pointer; font-size: 20px; }
        .nav-item.active { color: var(--gold); }

        .bead { position: absolute; width: 8px; height: 8px; background: var(--gold); border-radius: 50%; pointer-events: none; animation: fly 0.6s linear forwards; }
        @keyframes fly { to { transform: translateY(-150px) scale(0); opacity: 0; } }
    </style>
</head>
<body id="mainBody">

    <div class="main-header">
        <h1 style="margin:0; font-size: 22px;">بوابة النخبة V10</h1>
        <p id="time-now" style="font-size: 10px; opacity: 0.8;"></p>
    </div>

    <div class="ai-bubble" id="aiBubble">أهلاً بك يا شيخ هاشم، يوم جديد من العلم بانتظارك!</div>

    <div class="challenge-box">
        <div style="font-weight: bold; font-size: 13px; margin-bottom: 10px; color: var(--primary);">تحدي الـ 24 ساعة 🏆</div>
        <div class="challenge-item"><span>📖 دراسة 10 دقائق:</span> <b id="task-study">0/10</b></div>
        <div class="challenge-item"><span>📿 تسبيح 100 مرة:</span> <b id="task-ts">0/100</b></div>
        <div style="height: 5px; background: #eee; border-radius: 5px; margin-top: 5px;">
            <div id="challenge-bar" style="height: 100%; width: 0%; background: var(--gold); transition: 1s;"></div>
        </div>
    </div>

    <div id="home-page" class="page active">
        <div class="tasbih-area" id="tasbihZone" onclick="doTasbih(event)">
            <b id="ts-count" style="font-size: 40px; color: var(--primary);">0</b>
            <div style="font-size: 12px; color: var(--gold);">المس في أي مكان للذكر</div>
            <button onclick="resetTasbih(event)" style="position: absolute; top: 10px; left: 10px; border:none; background:none; color:red;"><i class="fa-solid fa-undo"></i></button>
        </div>

        <div class="grid">
            <div class="card" onclick="openYear('السنة الأولى')"><i class="fa-solid fa-scroll"></i><br><b>السنة الأولى</b></div>
            <div class="card" onclick="openYear('السنة الثانية')"><i class="fa-solid fa-mosque"></i><br><b>السنة الثانية</b></div>
            <div class="card" onclick="toggleIDCard()"><i class="fa-solid fa-id-card"></i><br><b>هويتي الملكية</b></div>
            <div class="card" onclick="showPage('notes-page', document.querySelector('.fa-pen'))"><i class="fa-solid fa-pen"></i><br><b>المفكرة</b></div>
        </div>

        <div id="id-card">
            <img id="u-img" src="" style="width:60px; border-radius:50%; border:2px solid white;">
            <h3 id="u-name" style="margin:10px 0 5px;">طالب العلم</h3>
            <p id="u-rank" style="font-size:12px; margin:0;">الرتبة: مبتدئ</p>
            <p style="font-size:10px; opacity:0.7;">كود النخبة: <span id="u-id"></span></p>
            <button onclick="tg.shareExternal()" style="margin-top:10px; padding:5px 15px; border-radius:10px; border:none; background:white; color:var(--primary); font-weight:bold;">مشاركة البطاقة 📤</button>
        </div>
    </div>

    <div id="items-page" class="page">
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <button onclick="switchDept('sh')" id="btn-sh" style="flex:1; padding:10px; border-radius:10px; border:none; background:var(--primary); color:white;">شريعة</button>
            <button onclick="switchDept('da')" id="btn-da" style="flex:1; padding:10px; border-radius:10px; border:none;">دعوة</button>
        </div>
        <div class="grid" id="items-container"></div>
        <button onclick="showPage('home-page')" style="width:100%; margin-top:20px; padding:15px; border-radius:15px; border:none; background:var(--dark-bg); color:white;">عودة</button>
    </div>

    <div id="notes-page" class="page">
        <div class="card">
            <select id="note-type" style="width:100%; padding:10px; border-radius:10px; margin-bottom:10px;">
                <option value="عامة">فائدة عامة</option>
                <option value="فقهية">فائدة فقهية</option>
                <option value="حديثية">فائدة حديثية</option>
            </select>
            <textarea id="note-input" style="width:100%; border:1px solid #eee; border-radius:10px; padding:10px;" placeholder="اكتب فائدتك..."></textarea>
            <button onclick="addNote()" style="width:100%; background:var(--gold); border:none; padding:10px; border-radius:10px; margin-top:10px; font-weight:bold;">حفظ ✅</button>
        </div>
        <div id="notes-list" style="margin-top:15px;"></div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showPage('home-page', this)"><i class="fa-solid fa-home"></i></div>
        <div class="nav-item" onclick="showPage('notes-page', this)"><i class="fa-solid fa-book"></i></div>
        <div class="nav-item" onclick="tg.openTelegramLink('https://t.me/Support')"><i class="fa-solid fa-question-circle"></i></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // 1. نظام الوقت والوضع الليلي
        function updateClock() {
            const now = new Date();
            document.getElementById('time-now').innerText = now.toLocaleString('ar-SA');
            if(now.getHours() >= 18 || now.getHours() < 5) {
                document.body.classList.add('night-mode');
            } else {
                document.body.classList.remove('night-mode');
            }
        }
        setInterval(updateClock, 1000); updateClock();

        // 2. السبحة والهابتيك
        let count = parseInt(localStorage.getItem('ts_v10')) || 0;
        document.getElementById('ts-count').innerText = count;
        function doTasbih(e) {
            count++;
            document.getElementById('ts-count').innerText = count;
            localStorage.setItem('ts_v10', count);
            document.getElementById('task-ts').innerText = count + "/100";
            updateChallenge();
            
            // الهابتيك الذكي
            if(count % 100 === 0) tg.HapticFeedback.notificationOccurred('success');
            else if(count % 33 === 0) tg.HapticFeedback.impactOccurred('heavy');
            else tg.HapticFeedback.impactOccurred('light');

            const bead = document.createElement('div');
            bead.className = 'bead';
            bead.style.left = e.offsetX + 'px';
            bead.style.top = e.offsetY + 'px';
            document.getElementById('tasbihZone').appendChild(bead);
            setTimeout(() => bead.remove(), 600);
        }

        // 3. تحدي الـ 24 ساعة
        let mins = parseInt(localStorage.getItem('mins_v10')) || 0;
        function updateChallenge() {
            document.getElementById('task-study').innerText = mins + "/10";
            let progress = ((mins/10) + (count/100)) * 50;
            document.getElementById('challenge-bar').style.width = Math.min(progress, 100) + "%";
            if(progress >= 100) document.getElementById('aiBubble').innerText = "مبروك! تم إنجاز تحدي اليوم بنجاح 🎉";
        }
        setInterval(() => { mins++; localStorage.setItem('mins_v10', mins); updateChallenge(); }, 60000);
        updateChallenge();

        // 4. المواد (12 مادة)
        const materials = {
            sh: ["الفقه المالكي", "أصول الفقه", "القواعد الفقهية", "المواريث", "فقه المعاملات", "فقه الجنايات", "فقه العبادات", "فقه الأسرة", "تاريخ التشريع", "أصول البحث", "القضاء الشرعي", "مقاصد الشريعة"],
            da: ["تفسير الأحكام", "علوم الحديث", "أصول الدعوة", "مقارنة الأديان", "السيرة النبوية", "العقيدة والتوحيد", "اللغة العربية", "النحو والصرف", "البلاغة", "المنطق", "الأخلاق والسلوك", "الملل والنحل"]
        };
        let currentDept = 'sh';
        function openYear(y) { renderItems(); showPage('items-page'); }
        function switchDept(d) {
            currentDept = d;
            document.getElementById('btn-sh').style.background = d === 'sh' ? 'var(--primary)' : '#eee';
            document.getElementById('btn-da').style.background = d === 'da' ? 'var(--primary)' : '#eee';
            renderItems();
        }
        function renderItems() {
            const cont = document.getElementById('items-container');
            cont.innerHTML = '';
            materials[currentDept].forEach(m => {
                cont.innerHTML += `<div class="card" onclick="tg.showAlert('${m}')"><i class="fa-solid fa-book-open"></i><br><b>${m}</b></div>`;
            });
        }

        // 5. بطاقة الهوية
        function toggleIDCard() {
            const card = document.getElementById('id-card');
            card.style.display = card.style.display === 'none' ? 'block' : 'none';
            const user = tg.initDataUnsafe?.user;
            if(user) {
                document.getElementById('u-name').innerText = user.first_name;
                document.getElementById('u-id').innerText = user.id;
                document.getElementById('u-img').src = user.photo_url || 'https://via.placeholder.com/60';
                document.getElementById('u-rank').innerText = mins > 40 ? "الرتبة: عالم إمبراطوري" : "الرتبة: طالب مجتهد";
            }
        }

        // 6. المفكرة بتصنيف
        let notes = JSON.parse(localStorage.getItem('notes_v10')) || [];
        function addNote() {
            const text = document.getElementById('note-input').value;
            const type = document.getElementById('note-type').value;
            if(text) {
                notes.push(`[${type}] ${text}`);
                localStorage.setItem('notes_v10', JSON.stringify(notes));
                document.getElementById('note-input').value = '';
                renderNotes();
            }
        }
        function renderNotes() {
            const list = document.getElementById('notes-list');
            list.innerHTML = '';
            notes.forEach((n, i) => {
                list.innerHTML += `<div class="card" style="text-align:right; margin-bottom:10px;">${n}</div>`;
            });
        }
        renderNotes();

        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(btn) { document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); btn.classList.add('active'); }
        }
        
        function resetTasbih(e) { e.stopPropagation(); count = 0; localStorage.setItem('ts_v10', 0); document.getElementById('ts-count').innerText = 0; updateChallenge(); }
    </script>
</body>
</html>
