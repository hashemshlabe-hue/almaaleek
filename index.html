<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة النخبة V9.0 - كلية الإمام مالك</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --primary: #1a2a6c; --gold: #d4af37; --accent: #7b2ff7;
            --bg: #f8fafc; --glass: rgba(255, 255, 255, 0.9);
            --boy-color: #1e3a8a; --girl-color: #be185d;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; transition: 0.4s; overflow-x: hidden; }
        
        /* زخرفة حسب الجنس */
        .boy-theme { --primary: #1e3a8a; --accent: #3b82f6; background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png'); }
        .girl-theme { --primary: #831843; --accent: #db2777; background-image: url('https://www.transparenttextures.com/patterns/fancy-pants.png'); }

        .main-header { background: linear-gradient(135deg, var(--primary), var(--accent)); padding: 40px 20px 80px; color: white; text-align: center; border-radius: 0 0 50px 50px; position: relative; }

        /* بطاقة الهوية الذكية */
        .id-card { 
            background: linear-gradient(135deg, #fff 0%, #f1f5f9 100%);
            margin: -60px 20px 20px; padding: 20px; border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 2px solid var(--gold);
            position: relative; overflow: hidden;
        }
        .id-card::before { content: "كلية الإمام مالك"; position: absolute; opacity: 0.05; font-size: 40px; transform: rotate(-20deg); top: 20px; right: -10px; font-weight: bold; }
        
        .user-info-grid { display: grid; grid-template-columns: 80px 1fr; gap: 15px; align-items: center; }
        .avatar-container { position: relative; }
        .avatar { width: 80px; height: 80px; border-radius: 20px; border: 3px solid var(--primary); object-fit: cover; }
        
        .data-row { font-size: 13px; margin-bottom: 5px; color: #444; }
        .data-label { font-weight: bold; color: var(--primary); }

        /* اختيار القسم والجنس */
        .setup-box { background: white; margin: 10px 20px; padding: 15px; border-radius: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        select, input { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #ddd; font-family: inherit; outline: none; }

        /* المكتبة الصوتية */
        .audio-player { background: white; margin: 15px 20px; padding: 15px; border-radius: 20px; border-right: 5px solid var(--gold); }
        .audio-controls { display: flex; align-items: center; gap: 15px; margin-top: 10px; }

        /* بطاقة الفائدة القابلة للتصوير */
        .note-card-capture { background: white; padding: 20px; border-radius: 15px; border: 1px solid #eee; position: relative; margin-bottom: 15px; }
        .share-btn { background: #25d366; color: white; border: none; padding: 5px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }

        .page { display: none; padding: 0 20px 130px; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .nav { position: fixed; bottom: 15px; left: 15px; right: 15px; background: #111; padding: 12px; border-radius: 25px; display: flex; justify-content: space-around; z-index: 1000; }
        .nav-item { color: #666; font-size: 20px; text-align: center; }
        .nav-item.active { color: var(--gold); }
        .nav-item span { display: block; font-size: 10px; }

        .btn-action { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 15px; width: 100%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body id="mainBody" class="boy-theme">

    <div class="main-header">
        <h2 style="margin:0">بوابة طالب النخبة</h2>
        <p style="font-size: 12px; opacity: 0.8;">كلية الإمام مالك للعلوم الشرعية</p>
    </div>

    <div class="id-card" id="idCard">
        <div class="user-info-grid">
            <div class="avatar-container">
                <img id="u-img" src="https://via.placeholder.com/80" class="avatar">
                <span id="gender-icon" style="position: absolute; bottom: -5px; right: -5px; background: white; border-radius: 50%; padding: 4px; font-size: 12px; border: 1px solid #ddd;">
                    <i class="fa-solid fa-mars" style="color: blue;"></i>
                </span>
            </div>
            <div>
                <h3 id="u-display-name" style="margin:0 0 8px; color: var(--primary);">طالب العلم</h3>
                <div class="data-row"><span class="data-label">الكود:</span> <span id="u-code">0000</span></div>
                <div class="data-row"><span class="data-label">القسم:</span> <span id="u-dept-display">الشريعة</span></div>
                <div class="data-row"><span class="data-label">المرحلة:</span> <span id="u-year">السنة الأولى</span></div>
            </div>
        </div>
        <div style="margin-top:15px; border-top: 1px dashed #ccc; padding-top:10px; text-align: center;">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=50x50&data=MalikStudent" style="width: 40px; opacity: 0.6;">
        </div>
    </div>

    <div class="setup-box">
        <select id="gender-select" onchange="updateTheme()">
            <option value="boy">واجهة الطلاب (ولاد)</option>
            <option value="girl">واجهة الطالبات (بنات)</option>
        </select>
        <select id="dept-select" onchange="saveProfile()">
            <option value="قسم الشريعة">قسم الشريعة</option>
            <option value="قسم الدعوة وأصول الدين">قسم الدعوة وأصول الدين</option>
        </select>
        <input type="text" id="code-input" placeholder="أدخل كود الطالب" oninput="saveProfile()">
    </div>

    <div id="home-page" class="page active">
        <div class="audio-player">
            <b style="font-size: 14px; color: var(--primary);"><i class="fa-solid fa-headphones"></i> المكتبة الصوتية (متون)</b>
            <div class="audio-controls">
                <button onclick="toggleAudio()" id="playBtn" style="border:none; background:var(--gold); width:40px; height:40px; border-radius:50%; color:white;">
                    <i class="fa-solid fa-play"></i>
                </button>
                <div style="flex:1">
                    <div style="font-size: 11px; margin-bottom: 3px;">متن أبي شجاع - كتاب الطهارة</div>
                    <div style="height:4px; background:#eee; border-radius:2px;"><div style="width:30%; height:100%; background:var(--accent);"></div></div>
                </div>
            </div>
            <audio id="mainAudio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio> 
        </div>

        <div style="padding: 0 20px;" class="grid">
             <button class="btn-action" onclick="tg.sendData('طلب تواصل مع الإدارة')">الربط مع البوت (تواصل مباشر)</button>
        </div>
    </div>

    <div id="notes-page" class="page">
        <div style="background:white; padding:20px; border-radius:25px; margin-bottom:20px;">
            <h3><i class="fa-solid fa-feather"></i> خزانة الفوائد</h3>
            <textarea id="note-input" style="width:100%; border:1px solid #eee; border-radius:15px; padding:10px;" rows="3" placeholder="اكتب فائدة اليوم..."></textarea>
            <button class="btn-action" onclick="addNote()">حفظ الفائدة +</button>
        </div>
        <div id="notes-list"></div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showPage('home-page', this)"><i class="fa-solid fa-id-badge"></i><span>الرئيسية</span></div>
        <div class="nav-item" onclick="showPage('notes-page', this)"><i class="fa-solid fa-book-open"></i><span>المفكرة</span></div>
        <div class="nav-item" onclick="captureID()"><i class="fa-solid fa-camera"></i><span>تصوير الهوية</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        // نظام الثيمات (ولاد/بنات)
        function updateTheme() {
            const gender = document.getElementById('gender-select').value;
            const body = document.getElementById('mainBody');
            const icon = document.querySelector('#gender-icon i');
            
            if(gender === 'girl') {
                body.className = 'girl-theme';
                icon.className = 'fa-solid fa-venus';
                icon.style.color = 'pink';
                tg.setHeaderColor('#831843');
            } else {
                body.className = 'boy-theme';
                icon.className = 'fa-solid fa-mars';
                icon.style.color = 'blue';
                tg.setHeaderColor('#1e3a8a');
            }
            localStorage.setItem('user_gender', gender);
        }

        // حفظ بيانات البروفايل
        function saveProfile() {
            const code = document.getElementById('code-input').value;
            const dept = document.getElementById('dept-select').value;
            document.getElementById('u-code').innerText = code || '0000';
            document.getElementById('u-dept-display').innerText = dept;
            localStorage.setItem('user_code', code);
            localStorage.setItem('user_dept', dept);
        }

        // تحويل الفائدة لصورة
        function shareNoteAsImage(id) {
            const noteElem = document.getElementById(id);
            html2canvas(noteElem).then(canvas => {
                const imgData = canvas.toDataURL("image/png");
                // هنا يمكن إرسالها للبوت أو تحميلها
                tg.showAlert("تم تجهيز صورة الفائدة للمشاركة! 📸");
                const link = document.createElement('a');
                link.download = 'fayda.png';
                link.href = imgData;
                link.click();
            });
        }

        // تصوير بطاقة الهوية
        function captureID() {
            html2canvas(document.getElementById('idCard')).then(canvas => {
                const imgData = canvas.toDataURL("image/png");
                tg.showAlert("تم حفظ بطاقة الهوية بنجاح ✅");
                const link = document.createElement('a');
                link.download = 'student_id.png';
                link.href = imgData;
                link.click();
            });
        }

        // المكتبة الصوتية
        function toggleAudio() {
            const audio = document.getElementById('mainAudio');
            const btn = document.getElementById('playBtn');
            if (audio.paused) {
                audio.play();
                btn.innerHTML = '<i class="fa-solid fa-pause"></i>';
            } else {
                audio.pause();
                btn.innerHTML = '<i class="fa-solid fa-play"></i>';
            }
        }

        function addNote() {
            const txt = document.getElementById('note-input').value;
            if(!txt.trim()) return;
            const id = 'note-' + Date.now();
            const noteHtml = `
                <div class="note-card-capture" id="${id}">
                    <p style="font-size:16px; color:#333; line-height:1.6;">${txt}</p>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                        <small style="color:var(--gold);">بوابة النخبة - كلية الإمام مالك</small>
                        <button class="share-btn" onclick="shareNoteAsImage('${id}')"><i class="fa-solid fa-share"></i> تحويل لصورة</button>
                    </div>
                </div>
            `;
            document.getElementById('notes-list').insertAdjacentHTML('afterbegin', noteHtml);
            document.getElementById('note-input').value = '';
        }

        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
        }

        // تحميل البيانات المحفوظة
        window.onload = () => {
            const user = tg.initDataUnsafe?.user;
            if(user) {
                document.getElementById('u-display-name').innerText = user.first_name;
                if(user.photo_url) document.getElementById('u-img').src = user.photo_url;
            }
            
            if(localStorage.getItem('user_gender')) {
                document.getElementById('gender-select').value = localStorage.getItem('user_gender');
                updateTheme();
            }
            if(localStorage.getItem('user_code')) {
                document.getElementById('code-input').value = localStorage.getItem('user_code');
                saveProfile();
            }
        };
    </script>
</body>
</html>
