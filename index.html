<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite Nexus X | بوابة النخبة المطلقة</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --neon-gold: #ffcf33; --neon-blue: #00f2ff;
            --deep-space: #050505; --glass-white: rgba(255, 255, 255, 0.05);
            --gradient-pro: linear-gradient(135deg, #0f172a 0%, #020617 100%);
        }

        body { 
            background: var(--deep-space); color: #fff; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* واجهة الانصهار الزجاجي */
        .cyber-bg {
            position: fixed; top: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 90% 80%, rgba(255, 207, 51, 0.05) 0%, transparent 50%);
            z-index: -1;
        }

        /* شريط الحالة النيون */
        .status-header {
            padding: 15px 25px; background: rgba(0,0,0,0.8);
            border-bottom: 1px solid var(--glass-white);
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(20px); sticky; top: 0; z-index: 1000;
        }

        /* بطاقة النخبة X-Card */
        .x-card {
            margin: 25px; background: var(--glass-white);
            border-radius: 40px; padding: 30px; border: 1px solid rgba(255,255,255,0.1);
            position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transition: 0.5s; overflow: hidden;
        }
        .x-card:hover { border-color: var(--neon-blue); }
        .x-card::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--neon-blue), transparent 30%);
            animation: rotate 4s linear infinite; opacity: 0.1; z-index: -1;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .avatar-glow {
            width: 90px; height: 90px; border-radius: 30px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-gold));
            padding: 3px; position: relative;
        }
        .avatar-glow img { width: 100%; height: 100%; border-radius: 27px; object-fit: cover; }

        /* أزرار الدردشة المنفصلة */
        .chat-nexus {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 25px;
        }
        .chat-btn {
            padding: 20px; border-radius: 25px; border: none; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            cursor: pointer; transition: 0.3s; color: white;
        }
        .chat-boys { background: linear-gradient(45deg, #1e3a8a, #3b82f6); box-shadow: 0 10px 20px rgba(59,130,246,0.3); }
        .chat-girls { background: linear-gradient(45deg, #831843, #ec4899); box-shadow: 0 10px 20px rgba(236,72,153,0.3); }

        /* منطقة الورد النووية */
        .nucleus {
            width: 220px; height: 220px; margin: 40px auto;
            border-radius: 50%; background: var(--glass-white);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px solid rgba(255,255,255,0.05); position: relative;
            box-shadow: inset 0 0 30px rgba(0,242,255,0.1); cursor: pointer;
        }
        .nucleus b { font-size: 70px; font-weight: 900; background: linear-gradient(to bottom, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* شبكة الميزات الـ 50 */
        .features-matrix {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 25px;
            padding-bottom: 140px;
        }
        .matrix-item {
            background: rgba(255,255,255,0.02); height: 100px; border-radius: 25px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.03); transition: 0.3s;
        }
        .matrix-item i { font-size: 24px; color: var(--neon-gold); margin-bottom: 8px; }
        .matrix-item span { font-size: 10px; opacity: 0.7; }

        /* القائمة السفلية المستقبلية */
        .nexus-nav {
            position: fixed; bottom: 30px; left: 20px; right: 20px;
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(30px);
            height: 75px; border-radius: 30px; display: flex; 
            justify-content: space-around; align-items: center;
            border: 1px solid rgba(255,255,255,0.1); z-index: 2000;
        }
        .nav-link { color: #555; display: flex; flex-direction: column; align-items: center; text-decoration: none; }
        .nav-link.active { color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); }
    </style>
</head>
<body>

    <div class="cyber-bg"></div>

    <div class="status-header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width: 10px; height: 10px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e;"></div>
            <span style="font-size: 12px; font-weight: bold; letter-spacing: 1px;">ELITE ONLINE</span>
        </div>
        <i class="fa-solid fa-ghost" style="color: var(--neon-gold);"></i>
    </div>

    <div class="x-card" id="profile-trigger">
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="avatar-glow">
                <img id="u-img" src="https://via.placeholder.com/150">
            </div>
            <div>
                <h2 style="margin:0; font-size: 22px;" id="u-name">هاشم شلابي</h2>
                <div style="margin-top: 5px; font-size: 11px; color: var(--neon-blue);">رتبة: النخبة الماسية</div>
                <div style="font-size: 10px; opacity: 0.5; margin-top: 3px;">كود الوصول: <span id="u-id">#NX-9901</span></div>
            </div>
        </div>
    </div>

    <div class="chat-nexus">
        <div class="chat-btn chat-boys" onclick="tg.showAlert('مرحباً بك في مجلس الشباب.. جاري الربط بسيرفر النخبة')">
            <i class="fa-solid fa-mars-stroke-right" style="font-size: 24px;"></i>
            <span>دردشة الشباب</span>
        </div>
        <div class="chat-btn chat-girls" onclick="tg.showAlert('مرحباً بكِ في مجلس طالبات العلم.. جاري الربط بسيرفر النخبة')">
            <i class="fa-solid fa-venus" style="font-size: 24px;"></i>
            <span>دردشة البنات</span>
        </div>
    </div>

    <div class="nucleus" onclick="hapticCount()">
        <span style="font-size: 10px; opacity: 0.4; letter-spacing: 2px;">CORE ENGINE</span>
        <b id="ts-count">0</b>
        <div style="position:absolute; width: 100%; height: 100%; border-radius: 50%; border: 1px solid var(--neon-blue); opacity: 0.1; animation: pulse 2s infinite;"></div>
    </div>

    <div class="features-matrix">
        <div class="matrix-item"><i class="fa-solid fa-robot"></i><span>المصحح الآلي</span></div>
        <div class="matrix-item"><i class="fa-solid fa-map-location-dot"></i><span>رادار العلم</span></div>
        <div class="matrix-item" onclick="changeSpec()"><i class="fa-solid fa-scroll"></i><span>المسار</span></div>
        <div class="matrix-item"><i class="fa-solid fa-vault"></i><span>الخزانة 3D</span></div>
        <div class="matrix-item"><i class="fa-solid fa-microchip"></i><span>الذكاء الرقمي</span></div>
        <div class="matrix-item"><i class="fa-solid fa-shield-halved"></i><span>وضع الحماية</span></div>
        <div class="matrix-item"><i class="fa-solid fa-chart-line"></i><span>البورصة</span></div>
        <div class="matrix-item"><i class="fa-solid fa-headphones"></i><span>الكتب الصوتية</span></div>
        <div class="matrix-item"><i class="fa-solid fa-medal"></i><span>الأوسمة</span></div>
    </div>

    <nav class="nexus-nav">
        <a href="#" class="nav-link active"><i class="fa-solid fa-house-signal"></i><span>Nexus</span></a>
        <a href="#" class="nav-link"><i class="fa-solid fa-book-open-reader"></i><span>الأكاديمية</span></a>
        <a href="#" class="nav-link"><i class="fa-solid fa-comments"></i><span>الدردشات</span></a>
        <a href="#" class="nav-link"><i class="fa-solid fa-gear"></i><span>النظام</span></a>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#050505');

        let count = parseInt(localStorage.getItem('nexus_ts')) || 0;
        let spec = localStorage.getItem('nexus_spec') || 'شريعة';
        document.getElementById('ts-count').innerText = count;

        function hapticCount() {
            count++;
            document.getElementById('ts-count').innerText = count;
            localStorage.setItem('nexus_ts', count);
            tg.HapticFeedback.impactOccurred('heavy');
            
            // تأثير انفجار نيون عند الضغط
            const nucleus = document.querySelector('.nucleus');
            nucleus.style.borderColor = 'var(--neon-blue)';
            nucleus.style.boxShadow = '0 0 40px rgba(0, 242, 255, 0.4)';
            setTimeout(() => {
                nucleus.style.borderColor = 'rgba(255,255,255,0.05)';
                nucleus.style.boxShadow = 'inset 0 0 30px rgba(0,242,255,0.1)';
            }, 150);
        }

        function changeSpec() {
            spec = (spec === 'شريعة') ? 'دعوة وأصول الدين' : 'شريعة';
            localStorage.setItem('nexus_spec', spec);
            tg.showAlert('تم تغيير بروتوكول التخصص إلى: ' + spec);
            tg.HapticFeedback.notificationOccurred('success');
        }

        const user = tg.initDataUnsafe?.user;
        if(user) {
            document.getElementById('u-name').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('u-id').innerText = "#NX-" + user.id.toString().slice(-4);
            if(user.photo_url) document.getElementById('u-img').src = user.photo_url;
        }

        // تأثير تحريك الواجهة مع ميلان الهاتف
        window.addEventListener('deviceorientation', (e) => {
            const card = document.querySelector('.x-card');
            const x = e.beta / 5;
            const y = e.gamma / 5;
            card.style.transform = `rotateX(${x}deg) rotateY(${y}deg)`;
        });
    </script>
</body>
</html>
